<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sotto</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="topline">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">
            <img src="assets/sotto-mark.svg" alt="" />
          </span>
          <div>
            <p class="eyebrow">Live Translator</p>
            <h1>Sotto</h1>
          </div>
        </div>
        <span class="status-dot" data-status-dot></span>
      </header>

      <section class="language-row" aria-label="Translation language">
        <label for="targetLanguage">Hear</label>
        <select id="targetLanguage" data-target-language></select>
      </section>

      <section class="language-row" aria-label="Translation voice">
        <label for="translationVoice">Voice</label>
        <select id="translationVoice" data-translation-voice></select>
      </section>

      <label class="secret-row" for="openaiApiKey">
        <span>OpenAI key</span>
        <input id="openaiApiKey" type="password" autocomplete="off" spellcheck="false" placeholder="sk-..." data-openai-api-key />
      </label>

      <button class="start-button" type="button" data-start-stop>
        <span data-start-label>Start</span>
      </button>

      <section class="mix" aria-label="Audio mix">
        <div class="mix-row">
          <label for="originalVolume">Original</label>
          <input id="originalVolume" type="range" min="0" max="100" value="18" data-original-volume />
          <output data-original-output>18</output>
        </div>
        <div class="mix-row">
          <label for="translationVolume">Voice</label>
          <input id="translationVolume" type="range" min="0" max="100" value="100" data-translation-volume />
          <output data-translation-output>100</output>
        </div>
      </section>

      <label class="toggle-row">
        <span>Source transcript</span>
        <input type="checkbox" data-source-visible />
      </label>

      <details class="bridge-details">
        <summary>Advanced bridge</summary>
        <label class="toggle-row">
          <span>Use local bridge</span>
          <input type="checkbox" data-bridge-mode />
        </label>
        <label class="bridge-token" for="bridgeToken">
          <span>Token</span>
          <input id="bridgeToken" type="password" autocomplete="off" spellcheck="false" data-bridge-token />
        </label>
      </details>

      <p class="status-line" data-status>Ready</p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
